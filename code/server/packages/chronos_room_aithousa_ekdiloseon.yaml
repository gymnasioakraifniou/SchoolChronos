# ===== CHRONOS – ΑΙΘΟΥΣΑ: Αίθουσα Εκδηλώσεων (aithousa_ekdiloseon) =====
# Helpers + αισθητήρες + media_player ΑΥΤΗΣ της αίθουσας.

input_boolean:
  chronos_aithousa_ekdiloseon_audio_enable:
    name: "Αίθουσα Εκδηλώσεων – Ηχητικός Σταθμός (enable)"
    icon: mdi:volume-high
  chronos_aithousa_ekdiloseon_visual_enable:
    name: "Αίθουσα Εκδηλώσεων – Οπτικός Σταθμός (enable)"
    icon: mdi:monitor
  chronos_aithousa_ekdiloseon_sim_fire:
    name: "Αίθουσα Εκδηλώσεων – [SIM] Πυρανίχνευση"
    icon: mdi:fire
  chronos_aithousa_ekdiloseon_sim_audio_online:
    name: "Αίθουσα Εκδηλώσεων – [SIM] Ηχητικός σταθμός online"
    icon: mdi:speaker
  chronos_aithousa_ekdiloseon_sim_visual_online:
    name: "Αίθουσα Εκδηλώσεων – [SIM] Οπτικός σταθμός online"
    icon: mdi:television

input_number:
  chronos_aithousa_ekdiloseon_timer_minutes:
    name: "Αίθουσα Εκδηλώσεων – Λεπτά αντίστροφης μέτρησης"
    min: 1
    max: 120
    step: 1
    initial: 5
    unit_of_measurement: min
    icon: mdi:timer-cog

timer:
  chronos_aithousa_ekdiloseon_countdown:
    name: "Αίθουσα Εκδηλώσεων – Αντίστροφη Μέτρηση"
    restore: true

input_text:
  chronos_aithousa_ekdiloseon_director_msg:
    name: "Αίθουσα Εκδηλώσεων – Μήνυμα προς Διευθυντή"
    max: 255
    icon: mdi:email-fast
  chronos_aithousa_ekdiloseon_tts_msg:
    name: "Αίθουσα Εκδηλώσεων – Κείμενο για εκφώνηση"
    max: 255
    icon: mdi:text-to-speech

media_player:
  - platform: universal
    name: chronos_aithousa_ekdiloseon_speaker
    unique_id: chronos_aithousa_ekdiloseon_speaker
    children:
      - media_player.aithousa_ekdiloseon
    device_class: speaker

template:
  - sensor:
      - name: chronos_aithousa_ekdiloseon_quote
        unique_id: chronos_aithousa_ekdiloseon_quote_tpl
        state: >
          {% set q = state_attr('input_select.chronos_quotes','options') %}
          {% set idx = ((now().timestamp() // 3600) | int) + 2 %}
          {{ q[idx % (q | length)] if q else '' }}
  - binary_sensor:
      - name: chronos_aithousa_ekdiloseon_fire
        unique_id: chronos_aithousa_ekdiloseon_fire_tpl
        device_class: smoke
        state: "{{ is_state('input_boolean.chronos_aithousa_ekdiloseon_sim_fire','on') }}"
      - name: chronos_aithousa_ekdiloseon_audio_station
        unique_id: chronos_aithousa_ekdiloseon_audio_station_tpl
        device_class: connectivity
        state: "{{ is_state('input_boolean.chronos_aithousa_ekdiloseon_sim_audio_online','on') }}"
      - name: chronos_aithousa_ekdiloseon_visual_station
        unique_id: chronos_aithousa_ekdiloseon_visual_station_tpl
        device_class: connectivity
        state: "{{ is_state('input_boolean.chronos_aithousa_ekdiloseon_sim_visual_online','on') }}"

