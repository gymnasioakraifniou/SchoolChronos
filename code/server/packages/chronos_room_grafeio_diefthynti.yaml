# ===== CHRONOS – ΑΙΘΟΥΣΑ: Γραφείο Διευθυντή (grafeio_diefthynti) =====
# Helpers + αισθητήρες + media_player ΑΥΤΗΣ της αίθουσας.

input_boolean:
  chronos_grafeio_diefthynti_audio_enable:
    name: "Γραφείο Διευθυντή – Ηχητικός Σταθμός (enable)"
    icon: mdi:volume-high
  chronos_grafeio_diefthynti_visual_enable:
    name: "Γραφείο Διευθυντή – Οπτικός Σταθμός (enable)"
    icon: mdi:monitor
  chronos_grafeio_diefthynti_sim_fire:
    name: "Γραφείο Διευθυντή – [SIM] Πυρανίχνευση"
    icon: mdi:fire
  chronos_grafeio_diefthynti_sim_audio_online:
    name: "Γραφείο Διευθυντή – [SIM] Ηχητικός σταθμός online"
    icon: mdi:speaker
  chronos_grafeio_diefthynti_sim_visual_online:
    name: "Γραφείο Διευθυντή – [SIM] Οπτικός σταθμός online"
    icon: mdi:television

input_number:
  chronos_grafeio_diefthynti_timer_minutes:
    name: "Γραφείο Διευθυντή – Λεπτά αντίστροφης μέτρησης"
    min: 1
    max: 120
    step: 1
    initial: 5
    unit_of_measurement: min
    icon: mdi:timer-cog

timer:
  chronos_grafeio_diefthynti_countdown:
    name: "Γραφείο Διευθυντή – Αντίστροφη Μέτρηση"
    restore: true

input_text:
  chronos_grafeio_diefthynti_director_msg:
    name: "Γραφείο Διευθυντή – Μήνυμα προς Διευθυντή"
    max: 255
    icon: mdi:email-fast
  chronos_grafeio_diefthynti_tts_msg:
    name: "Γραφείο Διευθυντή – Κείμενο για εκφώνηση"
    max: 255
    icon: mdi:text-to-speech

media_player:
  - platform: universal
    name: chronos_grafeio_diefthynti_speaker
    unique_id: chronos_grafeio_diefthynti_speaker
    children:
      - media_player.grafeio_diefthynti
    device_class: speaker

template:
  - sensor:
      - name: chronos_grafeio_diefthynti_quote
        unique_id: chronos_grafeio_diefthynti_quote_tpl
        state: >
          {% set q = state_attr('input_select.chronos_quotes','options') %}
          {% set idx = ((now().timestamp() // 3600) | int) + 0 %}
          {{ q[idx % (q | length)] if q else '' }}
  - binary_sensor:
      - name: chronos_grafeio_diefthynti_fire
        unique_id: chronos_grafeio_diefthynti_fire_tpl
        device_class: smoke
        state: "{{ is_state('input_boolean.chronos_grafeio_diefthynti_sim_fire','on') }}"
      - name: chronos_grafeio_diefthynti_audio_station
        unique_id: chronos_grafeio_diefthynti_audio_station_tpl
        device_class: connectivity
        state: "{{ is_state('input_boolean.chronos_grafeio_diefthynti_sim_audio_online','on') }}"
      - name: chronos_grafeio_diefthynti_visual_station
        unique_id: chronos_grafeio_diefthynti_visual_station_tpl
        device_class: connectivity
        state: "{{ is_state('input_boolean.chronos_grafeio_diefthynti_sim_visual_online','on') }}"

